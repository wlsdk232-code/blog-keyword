name: 블로그 검색순위 자동 점검

on:
  schedule:
    # 매일 00:00 UTC = 한국시간 매일 오전 9시
    # (cron 순서: 분 시 일 월 요일, 모두 UTC 기준)
    - cron: "0 0 * * *"
  workflow_dispatch: {}   # 깃허브 Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 순위 점검 실행 (최근 6개월 글, 변동 추적 + 오래된 글 정리)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python check_rankings.py --months 6

      - name: 결과 저장(커밋)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json report.html
          git commit -m "자동 순위 점검 $(date +%Y-%m-%d)" || echo "변경 사항 없음"
          git push
