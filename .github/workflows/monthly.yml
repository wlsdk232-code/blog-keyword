name: 블로그 검색순위 자동 점검

on:
  # 실행 트리거는 cron-job.org 에서 매일 한국시간 오전 9시에
  # workflow_dispatch API 를 호출하여 발생시킵니다.
  # (GitHub Actions 자체 schedule 은 정시 보장이 안 되고 수십 분~1시간
  #  지연되는 문제가 있어 제거했습니다. 이중 실행 방지 목적도 있음.)
  workflow_dispatch: {}   # 외부(cron-job.org) 및 Actions 탭 수동 실행

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 순위 점검 실행 (최근 6개월 글, 변동 추적 + 오래된 글 정리)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python check_rankings.py --months 6

      - name: 결과 저장(커밋)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json report.html
          git commit -m "자동 순위 점검 $(date +%Y-%m-%d)" || echo "변경 사항 없음"
          git push
